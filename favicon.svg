<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 128 128"
  width="128"
  height="128"
  fill="none"
>
  <defs>

    <!-- Gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#BF00FF"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Transparent Background -->

  <!-- Outer Hexagon -->
  <polygon
    points="64,10 108,36 108,92 64,118 20,92 20,36"
    stroke="url(#grad)"
    stroke-width="5"
    fill="rgba(255,255,255,0.02)"
    filter="url(#glow)"
    stroke-linejoin="round"
  />

  <!-- Inner Hexagon -->
  <polygon
    points="64,24 95,42 95,86 64,104 33,86 33,42"
    fill="#0B1020"
    opacity="0.9"
  />

  <!-- Left Bracket -->
  <path
    d="M52 44 L36 64 L52 84"
    stroke="url(#grad)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Slash -->
  <path
    d="M69 36 L58 92"
    stroke="url(#grad)"
    stroke-width="7"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Right Bracket -->
  <path
    d="M76 44 L92 64 L76 84"
    stroke="url(#grad)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

</svg>